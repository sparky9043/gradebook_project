<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="{% static 'js/tailwindcss.js' %}"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-surface-container-low: #1c1b1b;
      --color-surface-container: #201f1f;
      --color-on-surface: #e5e2e1;
      --color-on-secondary-container: #574200;
      --color-on-primary-fixed-variant: #891d00;
      --color-secondary: #fcc82c;
      --color-primary-fixed-dim: #ffb4a2;
      --color-surface-container-high: #2a2a2a;
      --color-on-secondary: #3e2e00;
      --color-secondary-container: #ddad00;
      --color-outline-variant: #5d3f38;
      --color-outline: #ae887f;
      --color-on-tertiary-fixed-variant: #005320;
      --color-primary-fixed: #ffdad2;
      --color-primary-container: #ff562b;
      --color-on-primary-container: #550e00;
      --color-tertiary-fixed: #72fe8f;
      --color-on-tertiary-fixed: #002108;
      --color-tertiary-fixed-dim: #53e076;
      --color-inverse-surface: #e5e2e1;
      --color-on-tertiary: #003914;
      --color-error: #ffb4ab;
      --color-on-primary-fixed: #3c0700;
      --color-background: #131313;
      --color-surface-bright: #3a3939;
      --color-on-primary: #611200;
      --color-tertiary: #53e076;
      --color-on-secondary-fixed: #241a00;
      --color-on-error: #690005;
      --color-on-error-container: #ffdad6;
      --color-error-container: #93000a;
      --color-surface-tint: #ffb4a2;
      --color-surface: #131313;
      --color-inverse-primary: #b42900;
      --color-secondary-fixed-dim: #f3c021;
      --color-secondary-fixed: #ffdf93;
      --color-on-secondary-fixed-variant: #594400;
      --color-tertiary-container: #00a748;
      --color-primary: #ffb4a2;
      --color-surface-dim: #131313;
      --color-inverse-on-surface: #313030;
      --color-surface-variant: #353534;
      --color-on-tertiary-container: #003210;
      --color-surface-container-lowest: #0e0e0e;
      --color-surface-container-highest: #353534;
      --color-on-surface-variant: #e7bdb3;
      --color-on-background: #e5e2e1;

      --radius: 0.25rem;
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
      --radius-full: 9999px;

      --font-headline: "Plus Jakarta Sans";
      --font-body: "Plus Jakarta Sans";
      --font-label: "Plus Jakarta Sans";
    }
  </style>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .neon-glow {
      box-shadow: 0 10px 30px -10px rgba(255, 62, 0, 0.15);
    }

    .glass-panel {
      background: rgba(58, 57, 57, 0.4);
      backdrop-filter: blur(20px);
    }
  </style>
  <title>Document</title>
</head>

<body
  class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
  <nav
    class="bg-[#131313] dark:bg-[#131313] font-['Plus_Jakarta_Sans'] tracking-tight docked full-width top-0 z-50 bg-[#201F1F] shadow-[0_10px_30px_-10px_rgba(255,62,0,0.15)] flex justify-between items-center px-6 py-3 w-full fixed">
    <div class="flex items-center gap-8">
      <span class="text-xl font-bold tracking-tighter text-[#FF3E00] uppercase">Academic Atelier</span>
      <div class="hidden md:flex items-center gap-6">
        <a class="text-[#FF3E00] border-b-2 border-[#FF3E00] py-1 text-sm font-bold uppercase tracking-widest"
          href="#">Home</a>
        <a class="text-gray-400 hover:bg-[#353534] transition-colors duration-200 px-3 py-1 rounded text-sm font-bold uppercase tracking-widest"
          href="#">Curriculum</a>
        <a class="text-gray-400 hover:bg-[#353534] transition-colors duration-200 px-3 py-1 rounded text-sm font-bold uppercase tracking-widest"
          href="#">Laboratory</a>
        <a class="text-gray-400 hover:bg-[#353534] transition-colors duration-200 px-3 py-1 rounded text-sm font-bold uppercase tracking-widest"
          href="#">Terminal</a>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <button class="text-gray-400 hover:bg-[#353534] p-2 rounded transition-colors duration-200">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button class="text-gray-400 hover:bg-[#353534] p-2 rounded transition-colors duration-200">
        <span class="material-symbols-outlined">settings</span>
      </button>
      <div class="w-8 h-8 rounded bg-surface-container-highest overflow-hidden border border-outline-variant/20">
        <img alt="Academic Profile"
          data-alt="Geometric minimalist avatar representing a professional academic researcher in a dark tech aesthetic"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsuaclZY8fQAwMrUc3F5qqdWkyZn2UxEy-48fr4HKt42OolQoe-qqk0lbBlSzEhWV2P26sXZFtGJefuZ5Oe7AtuLZc8qj2yTCCF1yc4vXlr5cwt-WKy8o1xWr1H5osZ54QvaRcRrk-oXNzFIJlYG3NVbmu-nx2KjPn5QW7YeDtdkY5Khq1m4M7LI0JSBQagI4YUhqqmfSxQqYeDHkQXGCnQRXlnMVgiXWje0l95fs8HkENjod5Kl3JcYP0UcViBpA6Pzl-3N68jWIw" />
      </div>
    </div>
  </nav>

  {% block main %} {% endblock main %}

  <footer class="px-6 py-12 bg-surface-container-lowest border-t border-outline-variant/10">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
      <div class="flex flex-col gap-2">
        <span class="text-lg font-black tracking-tighter text-[#FF3E00] uppercase">Academic Atelier</span>
        <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">Building Knowledge for
          the Terminal Era</p>
      </div>
      <div class="flex gap-8">
        <a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors"
          href="#">Privacy</a>
        <a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors"
          href="#">Security</a>
        <a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors"
          href="#">Changelog</a>
      </div>
      <div class="text-[10px] font-mono text-on-surface-variant/30">
        © 2024 ACADEMIC_ATELIER.EXE // ALL_RIGHTS_RESERVED
      </div>
    </div>
  </footer>
</body>

</html>
