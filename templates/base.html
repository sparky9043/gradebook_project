<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Plus+Jakarta+Sans:wght@200..800&amp;family=Inter:wght@100..900&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="{% static 'js/tailwindcss.js' %}"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-inverse-primary: #a3c9ff;
      --color-secondary: #006970;
      --color-surface-container-lowest: #ffffff;
      --color-tertiary-container: #7f65a7;
      --color-primary-container: #0073cb;
      --color-surface-dim: #b8dfff;
      --color-on-background: #001e30;
      --color-error-container: #ffdad6;
      --color-tertiary: #664c8d;
      --color-surface-tint: #0060ab;
      --color-primary: #005aa1;
      --color-on-tertiary-container: #fdf5ff;
      --color-surface-container-highest: #cae6ff;
      --color-on-tertiary: #ffffff;
      --color-on-secondary-container: #006e75;
      --color-primary-fixed: #d3e3ff;
      --color-on-surface: #001e30;
      --color-surface-variant: #cae6ff;
      --color-on-tertiary-fixed-variant: #533a79;
      --color-on-secondary-fixed-variant: #004f54;
      --color-on-secondary-fixed: #002022;
      --color-inverse-surface: #02344e;
      --color-on-tertiary-fixed: #260a4b;
      --color-secondary-fixed-dim: #81d4db;
      --color-secondary-container: #9bedf5;
      --color-on-secondary: #ffffff;
      --color-on-primary-fixed: #001c39;
      --color-on-error-container: #93000a;
      --color-background: #f6f9ff;
      --color-surface-container-low: #ebf5ff;
      --color-outline: #717783;
      --color-on-primary-container: #f5f7ff;
      --color-surface-bright: #f6f9ff;
      --color-on-surface-variant: #414752;
      --color-surface-container: #e0f0ff;
      --color-primary-fixed-dim: #a3c9ff;
      --color-on-primary: #ffffff;
      --color-surface: #f6f9ff;
      --color-tertiary-fixed-dim: #d6baff;
      --color-surface-container-high: #d5ebff;
      --color-inverse-on-surface: #e6f2ff;
      --color-error: #ba1a1a;
      --color-secondary-fixed: #9ef0f8;
      --color-outline-variant: #c0c7d4;
      --color-tertiary-fixed: #eddcff;
      --color-on-primary-fixed-variant: #004882;
      --color-on-error: #ffffff;

      --radius: 0.25rem;
      --radius-lg: 1rem;
      --radius-xl: 1.25rem;
      --radius-full: 9999px;

      --font-headline: "Newsreader";
      --font-body: "Plus Jakarta Sans";
      --font-label: "Inter";
    }
  </style>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .editorial-shadow {
      box-shadow: 0 20px 50px -12px rgba(0, 30, 48, 0.06);
    }
  </style>
  <title>Document</title>
</head>

<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
  <nav
    class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-lg shadow-sm shadow-blue-900/5 flex justify-between items-center px-12 py-6">
    <div class="font-headline italic text-2xl text-blue-900">Academy Editorial</div>
    <div class="hidden md:flex items-center space-x-12 font-headline text-lg tracking-tight">
      <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors duration-300" href="#">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform">home</span>
      </a>
      <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors duration-300" href="#">Courses</a>
      <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors duration-300" href="#">Students</a>
      <a class="text-slate-600 font-medium hover:text-blue-600 transition-colors duration-300" href="#">About</a>
    </div>
    <button
      class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-3 rounded-full font-body font-semibold tracking-wide scale-95 active:scale-100 transition-transform">
      Portal Login
    </button>
  </nav>

  {% block main %} {% endblock main %}

  <footer class="px-6 py-12 bg-surface-container-lowest border-t border-outline-variant/10">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
      <div class="flex flex-col gap-2">
        <span class="text-lg font-black tracking-tighter text-[#FF3E00] uppercase">Academic Atelier</span>
        <p class="text-[10px] text-on-surface-variant/50 uppercase tracking-[0.3em]">Building Knowledge for
          the Terminal Era</p>
      </div>
      <div class="flex gap-8">
        <a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors"
          href="#">Privacy</a>
        <a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors"
          href="#">Security</a>
        <a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors"
          href="#">Changelog</a>
      </div>
      <div class="text-[10px] font-mono text-on-surface-variant/30">
        © 2024 ACADEMIC_ATELIER.EXE // ALL_RIGHTS_RESERVED
      </div>
    </div>
  </footer>
  <div class="fixed right-0 top-1/2 -translate-y-1/2 z-40">
    <div
      class="bg-secondary-container/80 backdrop-blur-md p-4 rounded-l-lg editorial-shadow flex flex-col items-center gap-6 text-on-secondary-container">
      <button class="flex flex-col items-center gap-1 group">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform">stylus</span>
        <span class="text-[10px] font-label font-bold uppercase tracking-tighter">Inquire</span>
      </button>
      <div class="w-8 h-px bg-on-secondary-container/20"></div>
      <button class="flex flex-col items-center gap-1 group">
        <span class="material-symbols-outlined group-hover:scale-110 transition-transform">map</span>
        <span class="text-[10px] font-label font-bold uppercase tracking-tighter">Visit</span>
      </button>
    </div>
  </div>
</body>

</html>
