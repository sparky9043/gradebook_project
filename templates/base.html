<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;family=Manrope:wght@200..800&amp;display=swap"
    rel="stylesheet" />
  <!-- Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="{% static 'js/tailwindcss.js' %}"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-secondary: #334155;
      --color-outline-variant: #cbd5e1;
      --color-primary-fixed: #dbeafe;
      --color-on-tertiary-container: #1e3a8a;
      --color-error: #ef4444;
      --color-surface-tint: #1d4ed8;
      --color-surface: #ffffff;
      --color-surface-container-high: #f1f5f9;
      --color-tertiary-fixed-dim: #bfdbfe;
      --color-on-secondary: #ffffff;
      --color-surface-container-low: #f8fafc;
      --color-on-secondary-container: #1e293b;
      --color-primary-container: #eff6ff;
      --color-on-primary-fixed-variant: #1d4ed8;
      --color-on-secondary-fixed-variant: #334155;
      --color-tertiary: #1d4ed8;
      --color-surface-container: #f1f5f9;
      --color-surface-variant: #e2e8f0;
      --color-on-surface: #0f172a;
      --color-surface-bright: #ffffff;
      --color-on-error: #ffffff;
      --color-on-tertiary: #ffffff;
      --color-background: #ffffff;
      --color-tertiary-dim: #3b82f6;
      --color-secondary-container: #f1f5f9;
      --color-surface-container-lowest: #ffffff;
      --color-on-surface-variant: #475569;
      --color-primary-dim: #2563eb;
      --color-on-primary-fixed: #1e3a8a;
      --color-outline: #64748b;
      --color-on-secondary-fixed: #0f172a;
      --color-secondary-dim: #475569;
      --color-on-error-container: #7f1d1d;
      --color-primary: #1d4ed8;
      --color-secondary-fixed: #f1f5f9;
      --color-on-primary-container: #1e3a8a;
      --color-primary-fixed-dim: #bfdbfe;
      --color-on-primary: #ffffff;
      --color-on-tertiary-fixed-variant: #1e3a8a;
      --color-on-tertiary-fixed: #172554;
      --color-error-container: #fee2e2;
      --color-tertiary-fixed: #dbeafe;
      --color-inverse-surface: #020617;
      --color-tertiary-container: #eff6ff;
      --color-secondary-fixed-dim: #e2e8f0;
      --color-inverse-primary: #93c5fd;
      --color-surface-dim: #f1f5f9;
      --color-inverse-on-surface: #f1f5f9;
      --color-surface-container-highest: #e2e8f0;
      --color-error-dim: #991b1b;
      --color-on-background: #0f172a;

      --radius: 0.25rem;
      --radius-lg: 0.5rem;
      --radius-xl: 0.75rem;
      --radius-full: 9999px;

      --font-headline: "Plus Jakarta Sans";
      --font-body: "Manrope";
      --font-label: "Manrope";
    }
  </style>
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #ffffff;
    }

    .font-headline {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .text-gradient {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bg-primary-gradient {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
    }

    .active-nav {
      color: #1d4ed8;
      border-bottom: 2px solid #1d4ed8;
      padding-bottom: 4px;
    }
  </style>
  <title>Document</title>
</head>

<body class="bg-background text-on-surface">
  <nav
    class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-4 bg-white border-b border-slate-200/40">
    <div class="text-xl font-extrabold tracking-tighter text-blue-700 font-headline">Academic Atelier</div>
    <div class="hidden md:flex items-center gap-8 font-['Plus_Jakarta_Sans'] text-sm font-semibold tracking-tight">
      <a class="text-slate-500 hover:text-blue-600 transition-colors" href="#">
        <span class="material-symbols-outlined">home</span>
      </a>
      <a class="text-slate-500 hover:text-blue-600 transition-colors" href="#">Courses</a>
      <a class="text-slate-500 hover:text-blue-600 transition-colors" href="#">Students</a>
    </div>
    <div class="flex items-center gap-4">
      <button class="p-2 text-slate-500 hover:bg-slate-50 rounded-lg transition-all">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button class="p-2 text-slate-500 hover:bg-slate-50 rounded-lg transition-all">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>
  </nav>
  {% block main %} {% endblock main %}
</body>

</html>
