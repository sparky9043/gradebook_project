databases:
  - name: gradebookdb
    plan: free
    databaseName: gradebook
    user: gradebook

services:
  - type: web
    plan: free
    name: gradebook
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gradebookdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4